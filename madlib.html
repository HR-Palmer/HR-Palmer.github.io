<!DOCTYPE html>
<html>
    <head>
        <title>Henry Robert Palmer</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <div class="navbar">
            <a class="navlink" href="gallery.html">Photo Gallery</a>
            <a class="navlink" href="resume.html">Resume</a>
            <a class="navlink" href="index.html">Index</a>
            <a class="navlink" href="geoquiz.html">Geoquiz</a>
            <a class="navlink" href="blockgame.html">Block Game</a>
        </div>

        <!-- WELCOME SCREEN -->
        <div id="welcomeScreen" style="text-align: center;">
            <h1>Mad Lib</h1>
            <p>Play a fun game where you enter words of a certain variety when prompted and it comes together to form a silly story.</p>
            <button onclick="startGame()">Start Game</button>
        </div>

        <!-- GAME CONTENT (hidden at start) -->
        <div id="gameContainer" style="text-align: center; display: none;">

            <h2 id="Enter Word"></h2>

            <input id="answerInput" type="text" placeholder="Enter a word">

            <br><br>

            <button onclick="appendAnswer()">Submit Answer</button>
        </div>
        <script>
            function loadPrompt(){
                let promptWord=quizData[currentQuestion];
                document.getElementById("Enter Word").innerText="Enter a "+promptWord+".";
            }

            let currentQuestion=0;

            let quizData = ["adjective","noun","verb","noun","adjective","noun","verb"];
            let userWords = [];

            function appendAnswer(){

                let userAnswer = document.getElementById("answerInput").value;
                userWords.push(userAnswer);

                //Clear input
                document.getElementById("answerInput").value="";

                //Advance to next question
                currentQuestion++;
                if (currentQuestion < quizData.length){
                    loadPrompt();
                }else{
                    document.getElementById("Enter Word").innerText="Yesterday, I saw a "+userWords[0]+" "+userWords[1]+" trying to "+userWords[2]+" a giant "+userWords[3]+". It was so "+userWords[4]+" that I accidentally dropped my "+userWords[5]+" and started to "+userWords[6]+"!";
                }
            }

            function startGame(){
                document.getElementById("welcomeScreen").style.display="none";
                document.getElementById("gameContainer").style.display="block";
                loadPrompt();
                
            }
            
        </script>
    </body>
</html>
