        <h2>Block Push Game</h2>
        <p>Push blocks by touching them. You can push up to 2 at once.</p>

        <canvas id="gameCanvas" width="500" height="500" style="background-color: black;"></canvas>

        <script>
            // GLOBALS
            let canvas, ctx;

            const PLAYER_SIZE = 30;
            const BLOCK_SIZE = 40;
            const SPEED = 5;

            // CLASSES
            class Player{
                // constructor
                constructor(x,y){
                    this.x = x;
                    this.y = y;
                    this.size = 30;
                }

                draw(){
                    ctx.fillStyle = "blue";
                    ctx.fillRect(this.x, this.y, this.size, this.size);
                }

            }

            // SET UP
            function startGame(){
                canvas = document.getElementById("gameCanvas");
                ctx = canvas.getContext("2d");

                player = new Player(235,235);

                document.addEventListener("keydown", handleKeys);

                draw();
            }

            function move(dx, dy){
                let newX = player.x + dx;
                let newY = player.y + dy;

                //Stay in bounds
                if (newX < 0 || newY < 0 || newX+PLAYER_SIZE > canvas.width || newY+PLAYER_SIZE > canvas.height){
                    return;
                }

                player.x = newX;
                player.y = newY;

                draw();
            }

            // Draw for all objects on the canvas
            function draw(){
                ctx.clearRect(0,0,canvas.width,canvas.height);
                player.draw();
            }

            // Controls - Key Binding
            function handleKeys(e){
                if (e.key === "ArrowUp"){
                    move(0, -SPEED);
                }
                if (e.key === "ArrowDown"){
                    move(0, SPEED);
                }
                if (e.key === "ArrowLeft"){
                    move(-SPEED, 0);
                }
                if (e.key === "ArrowRight"){
                    move(SPEED, 0);
                }
            }

        </script>
    </body>
</html>
