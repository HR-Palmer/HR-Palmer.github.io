<!DOCTYPE html>
<html>
    <head>
        <title>Henry Robert Palmer</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <div class="navbar">
            <a class="navlink" href="gallery.html">Photo Gallery</a>
            <a class="navlink" href="resume.html">Resume</a>
            <a class="navlink" href="index.html">Index</a>
        </div>
        <!-- WELCOME SCREEN -->
        <div id="welcomeScreen" style="text-align: center;">
            <h1>Geography Quiz</h1>
            <p>Test your knowledge of U.S. state capitals! You will be given a state, and your job is to type in its capital.</p>
            <button onclick="startQuiz()">Start Quiz</button>
        </div>

        <!-- QUIZ CONTENT (hidden at start) -->
        <div id="quizContainer" style="text-align: center; display: none;">

            <h2 id="question"></h2>

            <input id="answerInput" type="text" placeholder="Enter your answer">

            <br><br>

            <button onclick="checkAnswer()">Submit Answer</button>

            <p id="feedback"></p>

            <p id="score">Correct Answers: 0</p>
        </div>
    </body>
</html>
